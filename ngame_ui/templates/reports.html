<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports - NGAME</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h1 class="h4 mb-0">Reports</h1>
      <a class="btn btn-outline-primary btn-sm" href="/dashboard">Dashboard</a>
    </div>
    <div class="card">
      <div class="card-body">
        {% if history and history|length > 0 %}
          <div class="table-responsive">
            <table class="table table-sm align-middle mb-0">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Timestamp</th>
                  <th>Type</th>
                </tr>
              </thead>
              <tbody>
                {% for h in history %}
                  <tr>
                    <td>{{ h.id }}</td>
                    <td>{{ h.timestamp }}</td>
                    <td>{{ h.analysis_type or h.type or 'analysis' }}</td>
                  </tr>
                {% endfor %}
              </tbody>
            </table>
          </div>
        {% else %}
          <p class="text-muted mb-0">No report history.</p>
        {% endif %}
      </div>
    </div>
  </div>
</body>
</html>
